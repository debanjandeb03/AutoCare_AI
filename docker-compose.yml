version: "3.9"

services:

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: autocare_backend
    ports:
      - "8000:8000"
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: autocare_frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped